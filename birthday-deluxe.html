<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎂 Happy Birthday! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
/* ──────────────── RESET & ROOT ──────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#ffd700;--rose:#ff4d8d;--sky:#4dd9ff;
  --mint:#00f0a0;--peach:#ff9f6b;--lavender:#d085ff;
  --bg1:#0a0118;--bg2:#130230;--bg3:#1a0540;
  --card:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.13);
}
html{scroll-behavior:smooth;}
body{
  font-family:'Quicksand',sans-serif;
  background:radial-gradient(ellipse at 20% 10%,#1e0540,transparent 60%),
             radial-gradient(ellipse at 80% 90%,#100328,transparent 60%),
             var(--bg1);
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
  cursor:crosshair;
}

/* ──────────────── CANVAS LAYERS ──────────────── */
#confetti-canvas,#fireworks-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:999;
}

/* ──────────────── BALLOONS ──────────────── */
#balloons-wrap{
  position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden;
}
.balloon{
  position:absolute;bottom:-140px;
  width:54px;height:65px;
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  animation:riseUp var(--spd) ease-in-out var(--dly) infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.4));
}
.balloon::before{
  content:'';position:absolute;
  bottom:-3px;left:50%;transform:translateX(-50%);
  width:9px;height:7px;
  background:inherit;filter:brightness(.65);
  border-radius:0 0 50% 50%;
}
.balloon::after{
  content:'';position:absolute;
  bottom:-36px;left:50%;transform:translateX(-50%);
  width:1.5px;height:34px;
  background:rgba(255,255,255,.35);
}
.balloon-shine{
  position:absolute;top:14px;left:13px;
  width:12px;height:18px;
  background:rgba(255,255,255,.35);
  border-radius:50%;
  transform:rotate(-30deg);
}
@keyframes riseUp{
  0%  {transform:translateY(0) translateX(0) rotate(-4deg);opacity:1;}
  30% {transform:translateY(-35vh) translateX(18px) rotate(4deg);}
  60% {transform:translateY(-70vh) translateX(-12px) rotate(-3deg);}
  90% {transform:translateY(-100vh) translateX(8px) rotate(2deg);opacity:.3;}
  100%{transform:translateY(-115vh) translateX(0) rotate(0);opacity:0;}
}

/* ──────────────── HERO ──────────────── */
.hero{
  position:relative;z-index:5;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:30px 20px 60px;
  gap:20px;
}
.sparkle-row{font-size:2rem;animation:sparkleRow 1.8s ease-in-out infinite alternate;}
@keyframes sparkleRow{
  from{transform:scale(1) rotate(-2deg);filter:brightness(1);}
  to{transform:scale(1.1) rotate(2deg);filter:brightness(1.5);}
}
.main-title{
  font-family:'Lobster',cursive;
  font-size:clamp(3.2rem,11vw,7.5rem);
  line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--rose),var(--lavender),var(--sky),var(--mint));
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShimmer 5s linear infinite,titleDrop .9s cubic-bezier(.34,1.56,.64,1) both;
  filter:drop-shadow(0 0 40px rgba(255,77,141,.35));
}
@keyframes titleShimmer{0%{background-position:0%;}100%{background-position:300%;}}
@keyframes titleDrop{
  from{transform:translateY(-80px) scale(.6);opacity:0;}
  to{transform:translateY(0) scale(1);opacity:1;}
}
.subtitle{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.1rem,3.5vw,1.7rem);
  color:rgba(255,255,255,.7);
  letter-spacing:2px;
  animation:fadeUp .8s ease .4s both;
}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* ──────────────── TYPING TEXT ──────────────── */
.typing-wrap{
  max-width:640px;width:100%;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  border-radius:22px;
  padding:26px 32px;
  animation:fadeUp .8s ease .6s both;
}
.typing-text{
  font-size:clamp(.95rem,2.5vw,1.15rem);
  color:rgba(255,255,255,.88);
  line-height:1.85;
  min-height:3.5rem;
}
.cursor{
  display:inline-block;width:2px;height:1.1em;
  background:var(--gold);
  vertical-align:text-bottom;
  animation:blink .7s step-end infinite;
  margin-left:2px;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ──────────────── COUNTDOWN ──────────────── */
.countdown-section{
  padding:70px 20px 40px;
  text-align:center;
  position:relative;z-index:5;
}
.section-label{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.3rem,4vw,2rem);
  color:var(--gold);
  margin-bottom:8px;
  text-shadow:0 0 20px rgba(255,215,0,.5);
}
.section-label small{display:block;font-family:'Quicksand',sans-serif;font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.countdown-grid{
  display:flex;gap:18px;justify-content:center;flex-wrap:wrap;
  margin-top:28px;
}
.cd-box{
  background:var(--card);border:1px solid var(--border);
  backdrop-filter:blur(18px);
  border-radius:20px;padding:24px 28px;
  min-width:100px;
  position:relative;overflow:hidden;
  animation:fadeUp .6s ease both;
}
.cd-box::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,.06),rgba(255,77,141,.06));
  border-radius:inherit;
}
.cd-num{
  font-family:'Lobster',cursive;
  font-size:clamp(2.4rem,6vw,3.6rem);
  background:linear-gradient(135deg,var(--gold),var(--peach));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;display:block;
}
.cd-label{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:6px;display:block;}

/* ──────────────── CAKE ──────────────── */
.cake-section{
  padding:60px 20px;
  display:flex;flex-direction:column;
  align-items:center;gap:28px;
  position:relative;z-index:5;
}
.cake-outer{
  position:relative;cursor:pointer;
  transition:transform .3s;
  animation:fadeUp .8s ease .2s both;
}
.cake-outer:hover{transform:scale(1.04) translateY(-4px);}
.cake{display:flex;flex-direction:column;align-items:center;}

.candles-row{display:flex;gap:20px;margin-bottom:-2px;position:relative;z-index:3;}
.candle-unit{display:flex;flex-direction:column;align-items:center;}
.flame-el{
  width:16px;height:26px;
  background:radial-gradient(ellipse at 50% 100%,#fff9c4,var(--gold) 45%,var(--peach) 72%,transparent);
  border-radius:50% 50% 35% 35%;
  transform-origin:bottom center;
  animation:flameFlick .25s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 10px var(--gold)) drop-shadow(0 0 22px var(--peach));
  transition:all .4s;
}
.flame-el.blown{width:0;height:0;filter:none;background:transparent;}
.smoke-el{
  width:3px;height:0;
  background:rgba(210,210,210,.55);
  border-radius:2px;
  margin-top:-2px;
  transition:none;
}
.smoke-el.puffing{animation:smokePuff 1.2s ease-out forwards;}
@keyframes smokePuff{
  0%{height:0;opacity:.7;transform:translateX(0);}
  50%{height:28px;opacity:.4;transform:translateX(5px);}
  100%{height:48px;opacity:0;transform:translateX(-5px);}
}
@keyframes flameFlick{
  from{transform:scaleX(1) scaleY(1) rotate(-3deg);}
  to{transform:scaleX(.82) scaleY(1.12) rotate(3deg);}
}
.wax{
  width:13px;height:42px;
  border-radius:4px;
  position:relative;overflow:hidden;
}
.wax::after{
  content:'';position:absolute;top:0;left:3px;
  width:3px;height:100%;
  background:rgba(255,255,255,.3);border-radius:2px;
}

.tier{border-radius:14px 14px 10px 10px;position:relative;overflow:hidden;}
.tier::after{
  content:'';position:absolute;top:8px;left:12px;right:12px;
  height:7px;background:rgba(255,255,255,.22);border-radius:4px;
}
.t1{width:150px;height:58px;background:linear-gradient(150deg,#f472b6,#db2777);}
.t2{width:205px;height:64px;background:linear-gradient(150deg,#818cf8,#4f46e5);}
.t3{width:262px;height:70px;background:linear-gradient(150deg,#fb923c,#ea580c);}

.frosting-strip{
  position:absolute;top:0;left:0;right:0;height:14px;
  background:#fff;border-radius:4px 4px 0 0;
}
.frosting-strip::after{
  content:'';position:absolute;bottom:-12px;left:0;right:0;height:14px;
  background:radial-gradient(circle at 50% 0%,white 6px,transparent 6px);
  background-size:22px 14px;
}
.sprinkles{
  position:absolute;bottom:8px;left:0;right:0;
  display:flex;justify-content:center;gap:9px;
}
.sprinkle{
  width:11px;height:11px;border-radius:50%;
  box-shadow:0 0 7px currentColor;
}
.plate-el{
  width:295px;height:20px;
  background:linear-gradient(180deg,#f1f5f9,#cbd5e1);
  border-radius:50%;
  box-shadow:0 7px 18px rgba(0,0,0,.35);
  margin-top:-3px;
}
.cake-hint{
  font-size:.82rem;color:rgba(255,255,255,.38);
  letter-spacing:1px;text-align:center;
  animation:breathe 2.5s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.38;}50%{opacity:.7;}}

/* ──────────────── CELEBRATE BUTTON ──────────────── */
.celebrate-wrap{
  text-align:center;padding:10px 20px 60px;
  position:relative;z-index:5;
}
.celebrate-btn{
  font-family:'Lobster',cursive;
  font-size:1.4rem;letter-spacing:1px;
  padding:18px 56px;
  border-radius:60px;border:none;
  background:linear-gradient(135deg,var(--rose),var(--lavender),var(--sky));
  background-size:200%;
  color:#fff;cursor:pointer;
  box-shadow:0 0 40px rgba(255,77,141,.45),0 5px 20px rgba(0,0,0,.35);
  transition:transform .3s,box-shadow .3s;
  animation:gradMove 4s linear infinite;
  position:relative;overflow:hidden;
}
.celebrate-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);
}
.celebrate-btn:hover{
  transform:translateY(-4px) scale(1.06);
  box-shadow:0 0 70px rgba(255,77,141,.7),0 10px 30px rgba(0,0,0,.35);
}
.celebrate-btn:active{transform:scale(.97);}
@keyframes gradMove{0%{background-position:0%;}100%{background-position:200%;}}

/* ──────────────── GALLERY ──────────────── */
.gallery-section{
  padding:60px 20px 80px;
  max-width:1100px;margin:0 auto;
  position:relative;z-index:5;
}
.gallery-title{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.6rem,5vw,2.5rem);
  text-align:center;color:var(--mint);
  text-shadow:0 0 25px rgba(0,240,160,.4);
  margin-bottom:36px;
}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
.gallery-card{
  border-radius:20px;overflow:hidden;
  background:var(--card);border:1px solid var(--border);
  backdrop-filter:blur(14px);
  transition:transform .4s cubic-bezier(.34,1.4,.64,1),box-shadow .4s;
  cursor:pointer;position:relative;
  animation:fadeUp .6s ease both;
}
.gallery-card:hover{
  transform:translateY(-10px) scale(1.03) rotate(1deg);
  box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 30px rgba(77,217,255,.2);
}
.gallery-card img{
  width:100%;aspect-ratio:1;object-fit:cover;display:block;
}
.gallery-card .g-caption{
  padding:12px 16px;
  font-size:.82rem;color:rgba(255,255,255,.65);
  text-align:center;letter-spacing:.5px;
}
.gallery-placeholder{
  width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;
  background:linear-gradient(135deg,var(--c1),var(--c2));
}

/* ──────────────── MUSIC BTN ──────────────── */
.music-fab{
  position:fixed;bottom:28px;right:28px;
  width:58px;height:58px;
  border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--lavender),var(--rose));
  color:#fff;font-size:1.55rem;
  cursor:pointer;z-index:1000;
  box-shadow:0 0 28px rgba(208,133,255,.55);
  transition:transform .3s,box-shadow .3s;
  display:flex;align-items:center;justify-content:center;
}
.music-fab:hover{transform:scale(1.12);}
.music-fab.on{animation:musicPulse 1.4s ease-in-out infinite;}
@keyframes musicPulse{
  0%,100%{box-shadow:0 0 28px rgba(208,133,255,.55);}
  50%{box-shadow:0 0 55px rgba(208,133,255,.9),0 0 80px rgba(255,77,141,.35);}
}

/* ──────────────── FOOTER ──────────────── */
footer{
  text-align:center;padding:30px 20px 50px;
  color:rgba(255,255,255,.25);font-size:.8rem;letter-spacing:2px;
  position:relative;z-index:5;
}
footer span{color:var(--rose);}

/* ──────────────── GLOW ORBS ──────────────── */
.orb{
  position:fixed;border-radius:50%;filter:blur(90px);
  pointer-events:none;z-index:0;opacity:.18;
  animation:orbFloat var(--od) ease-in-out infinite alternate;
}
@keyframes orbFloat{
  from{transform:translate(0,0);}
  to{transform:translate(var(--ox),var(--oy));}
}

/* ──────────────── SCROLL REVEAL ──────────────── */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ──────────────── RESPONSIVE ──────────────── */
@media(max-width:520px){
  .t1{width:115px;height:46px;}
  .t2{width:162px;height:52px;}
  .t3{width:210px;height:58px;}
  .plate-el{width:236px;}
  .cd-box{min-width:72px;padding:16px 14px;}
  .typing-wrap{padding:20px 18px;}
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  .celebrate-btn{font-size:1.1rem;padding:15px 38px;}
}
</style>
</head>
<body>

<!-- Canvas layers -->
<canvas id="confetti-canvas"></canvas>
<canvas id="fireworks-canvas"></canvas>

<!-- Glow orbs -->
<div class="orb" style="width:500px;height:500px;background:var(--rose);top:-150px;left:-100px;--od:9s;--ox:60px;--oy:80px;"></div>
<div class="orb" style="width:400px;height:400px;background:var(--sky);bottom:0;right:-80px;--od:11s;--ox:-70px;--oy:-60px;"></div>
<div class="orb" style="width:350px;height:350px;background:var(--lavender);top:40%;left:35%;--od:13s;--ox:50px;--oy:-90px;"></div>

<!-- Balloons -->
<div id="balloons-wrap"></div>

<!-- ══════════ HERO ══════════ -->
<section class="hero">
  <div class="sparkle-row">🎉 🌟 🎊 🌟 🎉</div>
  <h1 class="main-title">Happy Birthday! ROSE</h1>
  <p class="subtitle">— Celebrating a truly special soul —</p>
  <div class="typing-wrap">
    <p class="typing-text" id="typing-text"><span class="cursor"></span></p>
  </div>
</section>

<!-- ══════════ COUNTDOWN ══════════ -->
<section class="countdown-section reveal">
  <p class="section-label">
    ⏳ Countdown to the Big Day
    <small>Next Birthday</small>
  </p>
  <div class="countdown-grid">
    <div class="cd-box" style="animation-delay:.0s"><span class="cd-num" id="cd-days">00</span><span class="cd-label">Days</span></div>
    <div class="cd-box" style="animation-delay:.1s"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">Hours</span></div>
    <div class="cd-box" style="animation-delay:.2s"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">Minutes</span></div>
    <div class="cd-box" style="animation-delay:.3s"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">Seconds</span></div>
  </div>
</section>

<!-- ══════════ CAKE ══════════ -->
<section class="cake-section">
  <p class="section-label reveal">🎂 Make a Wish!</p>
  <div class="cake-outer reveal" id="cakeOuter" title="Click to blow candles!">
    <div class="cake">
      <div class="candles-row" id="candlesRow"></div>
      <div class="tier t1"><div class="frosting-strip"></div><div class="sprinkles"><span class="sprinkle" style="color:#ffd700;background:#ffd700"></span><span class="sprinkle" style="color:#60a5fa;background:#60a5fa"></span><span class="sprinkle" style="color:#34d399;background:#34d399"></span></div></div>
      <div class="tier t2"><div class="frosting-strip"></div><div class="sprinkles"><span class="sprinkle" style="color:#ffd700;background:#ffd700"></span><span class="sprinkle" style="color:#f472b6;background:#f472b6"></span><span class="sprinkle" style="color:#ffd700;background:#ffd700"></span><span class="sprinkle" style="color:#34d399;background:#34d399"></span></div></div>
      <div class="tier t3"><div class="frosting-strip"></div><div class="sprinkles"><span class="sprinkle" style="color:#ffd700;background:#ffd700"></span><span class="sprinkle" style="color:#c084fc;background:#c084fc"></span><span class="sprinkle" style="color:#60a5fa;background:#60a5fa"></span><span class="sprinkle" style="color:#f472b6;background:#f472b6"></span><span class="sprinkle" style="color:#34d399;background:#34d399"></span></div></div>
      <div class="plate-el"></div>
    </div>
  </div>
  <p class="cake-hint" id="cakeHint">🕯️ Click the cake to blow out the candles!</p>
</section>

<!-- ══════════ CELEBRATE ══════════ -->
<div class="celebrate-wrap reveal">
  <button class="celebrate-btn" id="celebrateBtn">🎆 Celebrate! 🎆</button>
</div>

<!-- ══════════ GALLERY ══════════ -->
<section class="gallery-section">
  <h2 class="gallery-title reveal">📸 Birthday Memories</h2>
  <div class="gallery-grid" id="galleryGrid"></div>
</section>

<footer>Made with <span>♥</span> · Happy Birthday · 🎂</footer>

<!-- Music FAB -->
<button class="music-fab" id="musicFab" title="Toggle music">🎵</button>

<script src="script.js"></script>
</body>
</html>
